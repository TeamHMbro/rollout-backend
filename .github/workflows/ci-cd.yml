name: ci-cd

on:
  push:
    branches:
      - main

concurrency:
  group: rollout-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Rollout.sln

      - name: Test
        run: dotnet test Rollout.sln -c Release --no-restore

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/rollout-api" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          test -n "$SERVER_HOST" || { echo "SERVER_HOST is missing"; exit 1; }
          test -n "$SERVER_USER" || { echo "SERVER_USER is missing"; exit 1; }
          test -n "$SSH_PRIVATE_KEY" || { echo "SSH_PRIVATE_KEY is missing"; exit 1; }

          SERVER_PORT="${SERVER_PORT:-22}"

          mkdir -p ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"
          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" 'mkdir -p /opt/rollout/deploy/postgres/init'

      - name: Upload deployment files
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"

          scp -P "$SERVER_PORT" deploy/production/docker-compose.yml "$SERVER_USER@$SERVER_HOST:/opt/rollout/docker-compose.yml"
          scp -P "$SERVER_PORT" deploy/postgres/init/01-create-databases.sh "$SERVER_USER@$SERVER_HOST:/opt/rollout/deploy/postgres/init/01-create-databases.sh"
          scp -P "$SERVER_PORT" deploy/production/scripts/deploy.sh "$SERVER_USER@$SERVER_HOST:/opt/rollout/deploy.sh"

      - name: Deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"

          ssh -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" '
            chmod +x /opt/rollout/deploy.sh && \
            /opt/rollout/deploy.sh ${{ github.sha }} && \
            curl -fsS http://127.0.0.1:8080/health
          '