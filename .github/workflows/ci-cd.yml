name: ci-cd

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: rollout-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Rollout.sln

      - name: Test
        run: dotnet test Rollout.sln -c Release --no-restore

  docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/rollout-api" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - docker

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p '${{ secrets.SERVER_PORT }}' '${{ secrets.SERVER_HOST }}' >> ~/.ssh/known_hosts

      - name: Upload deployment files
        run: |
          scp -P '${{ secrets.SERVER_PORT }}' deploy/production/docker-compose.yml '${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/rollout/docker-compose.yml'
          scp -P '${{ secrets.SERVER_PORT }}' deploy/postgres/init/01-create-databases.sh '${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/rollout/deploy/postgres/init/01-create-databases.sh'
          scp -P '${{ secrets.SERVER_PORT }}' deploy/scripts/deploy.sh '${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/rollout/deploy.sh'
          scp -P '${{ secrets.SERVER_PORT }}' deploy/scripts/rollback.sh '${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/rollout/rollback.sh'
          scp -P '${{ secrets.SERVER_PORT }}' deploy/scripts/backup.sh '${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/rollout/backup.sh'

      - name: Deploy
        run: |
          ssh -p '${{ secrets.SERVER_PORT }}' '${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}' '
            chmod +x /opt/rollout/deploy.sh /opt/rollout/rollback.sh /opt/rollout/backup.sh && \
            /opt/rollout/deploy.sh ${{ github.sha }} && \
            curl -fsS http://127.0.0.1:8080/health
          '